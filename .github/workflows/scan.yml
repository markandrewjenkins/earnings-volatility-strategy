name: Earnings volatility scan

# Refreshes scan_results.json for the dashboard.
# GitHub schedules are best-effort: a */15 cron typically fires every 15–30
# minutes under load. The window that actually matters for entries is the
# final hour before the US close, and there are dedicated runs for it.

on:
  schedule:
    # Every 15 min through the US session (13:00–21:00 UTC covers
    # 9:00am–5:00pm ET in EDT; in EST everything shifts one hour later,
    # still inside the window).
    - cron: "*/15 13-21 * * 1-5"
    # Dedicated entry-window shots (15:00-16:00 ET): GitHub throttles the
    # */15 pattern to ~90-min gaps, which missed the entry window two days
    # running. Discrete odd-minute crons fire far more reliably.
    - cron: "7,26,44 19 * * 1-5"
    - cron: "7,26,44 20 * * 1-5"
    # Exit passes just after 9:40 ET (EDT/EST)
    - cron: "47 13 * * 1-5"
    - cron: "47 14 * * 1-5"
    # Pre-open full scan
    - cron: "50 12 * * 1-5"
    # One late-evening run so the dashboard rolls to the next trade date
    # after AMC reporters are done.
    - cron: "5 23 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: earnings-scan
  cancel-in-progress: false   # queue, don't kill 12-min full scans

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run scanner
        # Full scan (12-15 min) pre-open, midday and evening; fast scan
        # (2-3 min, today's window only) otherwise so throttled schedules
        # still land inside the entry window.
        run: |
          H=$(date -u +%H); M=$(date -u +%M)
          if [ "$H" = "12" ] || [ "$H" = "23" ] || { [ "$H" = "16" ] && [ "$M" -lt 20 ]; }; then
            python scanner.py --max 45
          else
            python scanner.py --fast --max 20
          fi

      - name: Update paper-trade tracker
        run: python tracker.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results.json calendar_cache.json trades_log.json sector_cache.json reaction_log.json
          if ! git diff --cached --quiet; then
            git pull --rebase --autostash || true
            git commit -m "chore: refresh scan results [skip ci]"
            git push
          else
            echo "No data changes — nothing to commit."
          fi
