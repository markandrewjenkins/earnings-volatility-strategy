name: Earnings volatility scan

# Refreshes scan_results.json for the dashboard.
# GitHub schedules are best-effort: a */15 cron typically fires every 15–30
# minutes under load. The window that actually matters for entries is the
# final hour before the US close, and there are dedicated runs for it.

on:
  schedule:
    # cron-job.org drives the every-5-min intraday refresh via workflow_dispatch
    # (reliable, un-throttled). These scheduled runs are only a backup so the
    # dashboard still updates if that external trigger is ever down.
    - cron: "50 12 * * 1-5"
    - cron: "0 17,19 * * 1-5"
    - cron: "45 13,14 * * 1-5"
    - cron: "5 23 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: earnings-scan
  cancel-in-progress: false   # queue, don't kill 12-min full scans

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run scanner
        # Full scan (12-15 min) pre-open, midday and evening; fast scan
        # (2-3 min, today's window only) otherwise so throttled schedules
        # still land inside the entry window.
        run: |
          H=$(date -u +%H); M=$(date -u +%M)
          if [ "$H" = "12" ] || [ "$H" = "23" ] || { [ "$H" = "16" ] && [ "$M" -lt 20 ]; }; then
            python scanner.py --max 45
          else
            python scanner.py --fast --max 20
          fi

      - name: Update paper-trade tracker
        run: python tracker.py

      - name: Commit if changed
        # Never fail the run on a transient push race — cron-job.org (every
        # 5 min) and the scheduled backups can overlap, so pushes sometimes
        # get rejected non-fast-forward. Retry with rebase; give up quietly.
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results.json calendar_cache.json trades_log.json sector_cache.json reaction_log.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh scan results [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash -X ours origin main || true
            if git push origin main; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed (race) — retrying"; sleep 5
          done
          echo "could not push after retries — next scan will carry the data"
          exit 0
